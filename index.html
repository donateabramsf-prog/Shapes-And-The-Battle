<!DOCTYPE html>
<html>
<head>
  <title>Shapes And The Battle</title>
  <style>
    body {
      margin: 0;
      background: #171b2e;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin: 18px 0 5px;
    }

    #game {
      width: 700px;
      max-width: 92%;
      height: 420px;
      margin: 20px auto;
      position: relative;
      overflow: hidden;
      border: 4px solid white;
      border-radius: 18px;
      background: linear-gradient(#334b88, #17213e);
    }

    #player {
      width: 55px;
      height: 55px;
      background: #35e96f;
      border-radius: 50%;
      position: absolute;
      left: 50px;
      bottom: 45px;
      border: 4px solid white;
    }

    .enemy {
      width: 48px;
      height: 48px;
      background: #ff4d5b;
      position: absolute;
      border: 4px solid white;
      cursor: pointer;
      animation: wobble 0.5s infinite alternate;
    }

    @keyframes wobble {
      from { transform: rotate(-8deg); }
      to { transform: rotate(8deg); }
    }

    button {
      background: #ffd84d;
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px;
    }

    button:hover {
      transform: scale(1.06);
    }

    #message {
      font-size: 20px;
      min-height: 28px;
    }
  </style>
</head>
<body>

  <h1>⚔️ Shapes And The Battle ⚔️</h1>
  <div id="message">Press Start to battle!</div>
  <button id="startButton">Start Battle</button>
  <div>Score: <span id="score">0</span> | Lives: <span id="lives">3</span></div>

  <div id="game">
    <div id="player"></div>
  </div>

  <script>
    const game = document.getElementById("game");
    const scoreText = document.getElementById("score");
    const livesText = document.getElementById("lives");
    const message = document.getElementById("message");
    const startButton = document.getElementById("startButton");

    let score = 0;
    let lives = 3;
    let playing = false;
    let enemyTimer;

    function makeEnemy() {
      if (!playing) return;

      const enemy = document.createElement("div");
      enemy.className = "enemy";

      const shapes = ["0px", "50%", "12px"];
      enemy.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];

      enemy.style.left = Math.random() * (game.clientWidth - 60) + "px";
      enemy.style.top = Math.random() * (game.clientHeight - 60) + "px";

      enemy.onclick = function () {
        score++;
        scoreText.textContent = score;
        enemy.remove();
        message.textContent = "Enemy defeated! 💥";
      };

      game.appendChild(enemy);

      setTimeout(function () {
        if (enemy.parentNode) {
          enemy.remove();
          lives--;
          livesText.textContent = lives;
          message.textContent = "An enemy escaped!";

          if (lives <= 0) {
            endGame();
          }
        }
      }, 1800);
    }

    function startGame() {
      score = 0;
      lives = 3;
      playing = true;
      scoreText.textContent = score;
      livesText.textContent = lives;
      message.textContent = "Click the red shapes before they escape!";
      startButton.textContent = "Battle Running...";
      startButton.disabled = true;

      document.querySelectorAll(".enemy").forEach(enemy => enemy.remove());

      enemyTimer = setInterval(makeEnemy, 800);
      makeEnemy();
    }

    function endGame() {
      playing = false;
      clearInterval(enemyTimer);
      document.querySelectorAll(".enemy").forEach(enemy => enemy.remove());
      message.textContent = "Game over! Final score: " + score;
      startButton.textContent = "Play Again";
      startButton.disabled = false;
    }

    startButton.onclick = startGame;
  </script>

</body>
</html>
